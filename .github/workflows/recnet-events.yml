name: Update RecNet events JSON

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *" # every hour

permissions:
  contents: write

concurrency:
  group: recnet-events
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch events
        env:
          RECNET_ROOM_ID: "327347949182124365"
        run: node scripts/fetch-recnet-events.mjs

      - name: Commit & push if changed
        run: |
          git config user.name "recnet-events-bot"
          git config user.email "recnet-events-bot@users.noreply.github.com"

          # stage outputs if they exist
          git add data/events.json data/events_error.json || true

          # if nothing staged, exit cleanly
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update RecNet events.json"
          git push