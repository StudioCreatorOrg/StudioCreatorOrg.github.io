name: Update RecNet events JSON

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"  # every 30 minutes (adjust if you want)

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch events
        env:
          RECNET_ROOM_ID: "327347949182124365"
        run: node scripts/fetch-recnet-events.mjs

      - name: Commit changes (if any)
        run: |
          git config user.name "recnet-bot"
          git config user.email "recnet-bot@users.noreply.github.com"
          git add data/events.json data/events_error.json || true
          git commit -m "Update events.json" || exit 0
          git push